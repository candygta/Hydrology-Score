            --primary-bg: #eef2ff;
            --accent: #f59e0b;
            --accent-light: #fef3c7;
            --success: #10b981;
            --success-bg: #d1fae5;
            --danger: #ef4444;

            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;

            min-height: 100vh;
            color: var(--gray-800);
            overflow-x: hidden;
        }

        /* Animated background particles */
        .bg-decoration {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .bg-decoration::before,
        .bg-decoration::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s ease-in-out infinite;
        }
        .bg-decoration::before {
            width: 600px; height: 600px;
            background: white;
            top: -200px; right: -100px;
        }
        .bg-decoration::after {
            width: 400px; height: 400px;
            background: white;
            bottom: -100px; left: -100px;
            animation-delay: -10s;
            animation-duration: 25s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-30px) rotate(5deg); }
            66% { transform: translateY(20px) rotate(-3deg); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px 60px;
            position: relative;
            z-index: 1;
        }

        /* Header */

            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }
        .header-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            color: white;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .header h1 {
            font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            line-height: 1.2;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.15);
        }
        .header h2 {
            font-size: 1.15rem;
            font-weight: 400;
            color: rgba(255,255,255,0.85);
            letter-spacing: 0.3px;
        }

        /* Search Card */
        .search-card {
            background: white;
            border-radius: var(--radius);
            padding: 36px 32px;
            box-shadow: var(--shadow-xl);
            margin-bottom: 28px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }
        .search-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 14px;
        }
        .search-label svg {
            width: 22px;
            height: 22px;
            color: var(--primary);
        }
        .search-wrapper {
            position: relative;
            display: flex;
            gap: 12px;
        }
        .search-input-wrap {
            position: relative;
            flex: 1;
        }
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--gray-400);
            transition: color 0.3s;
        }
        .search-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: 1.05rem;
            font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif;
            color: var(--gray-800);
            background: var(--gray-50);
            transition: all 0.3s ease;
            outline: none;
            letter-spacing: 1px;
        }
        .search-input::placeholder {
            color: var(--gray-400);
            letter-spacing: 0;
        }
        .search-input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        .search-input:focus ~ .search-icon,
        .search-input:focus + .search-icon {
            color: var(--primary);
        }
        .search-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
        }
        .search-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
        }
        .search-btn:active {
            transform: translateY(0);
        }
        .search-hint {
            margin-top: 10px;
            font-size: 0.82rem;
            color: var(--gray-400);
        }

        /* Result Card */
        .result-card {
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-xl);
            animation: fadeInUp 0.5s ease-out;
        }

        /* Student Info Header */
        .student-header {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            padding: 28px 32px;
            color: white;
        }
        .student-id-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 10px;
            backdrop-filter: blur(5px);

            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .student-meta {
            font-size: 0.9rem;
            opacity: 0.85;
        }

            display: grid;

            gap: 12px;
            padding: 24px 32px;
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-100);
        }
        .summary-item {
            text-align: center;
            padding: 16px 8px;
            background: white;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease;
        }
        .summary-item:hover {
            transform: translateY(-2px);
        }
        .summary-value {
            font-family: 'Inter', sans-serif;
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
        }
        .summary-value.highlight {
            color: var(--accent);
            font-size: 2rem;
        }
        .summary-label {
            font-size: 0.75rem;
            color: var(--gray-500);
            margin-top: 4px;
            font-weight: 500;
        }

        /* Score Table */
        .score-table-wrap {
            padding: 24px 32px 32px;
        }
        .score-table-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gray-600);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            border-collapse: separate;
            border-spacing: 0;
            overflow: hidden;
            border-radius: var(--radius-sm);
            border: 1px solid var(--gray-200);
        }
        .score-table thead th {

            color: white;
            padding: 12px 16px;
            font-size: 0.82rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.3px;
        }
        .score-table thead th:first-child {
            text-align: left;
        }
        .score-table tbody td {
            padding: 12px 16px;
            text-align: center;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--gray-100);
            transition: background 0.2s;
        }
        .score-table tbody td:first-child {
            text-align: left;
            font-weight: 500;
            color: var(--gray-700);
        }
        .score-table tbody tr:hover td {
            background: var(--primary-bg);
        }
        .score-table tbody tr:last-child td {
            border-bottom: none;
        }
        .score-cell {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }
        .score-full {
            color: var(--success);
        }
        .score-partial {
            color: var(--accent);
        }
        .score-missing {
            color: var(--danger);
            font-weight: 400;
            font-size: 0.85rem;
        }
        .score-bar {
            display: inline-block;
            height: 4px;
            border-radius: 2px;
            margin-top: 4px;
            transition: width 0.6s ease;
        }

        /* Total Row */
        .score-table tfoot td {
            padding: 14px 16px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-bg), #ede9fe);
            text-align: center;
            font-size: 1rem;
            border-top: 2px solid var(--primary-light);
        }
        .score-table tfoot td:first-child {
            text-align: left;
            color: var(--primary-dark);
        }
        .total-score {
            color: var(--primary-dark);
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
        }

        /* States */
        .empty-state {
            text-align: center;
            padding: 60px 32px;
            animation: fadeInUp 0.5s ease-out;
        }
        .empty-state-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: var(--gray-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state h3 {
            font-size: 1.1rem;
            color: var(--gray-700);
            margin-bottom: 8px;
        }
        .empty-state p {
            font-size: 0.9rem;
            color: var(--gray-400);
        }

        .not-found {
            text-align: center;
            padding: 50px 32px;
            animation: shake 0.4s ease-out;

        .not-found-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;

            display: flex;
            align-items: center;

            margin-bottom: 6px;

            color: var(--gray-400);

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

            .header h2 { font-size: 0.95rem; }
            .search-card { padding: 24px 20px; }

            .search-btn { width: 100%; padding: 14px; }
            .student-header { padding: 20px; }
            .student-name { font-size: 1.2rem; }
            .score-summary { padding: 16px; grid-template-columns: repeat(2, 1fr); }
            .score-table-wrap { padding: 16px; }
            .score-table thead th,

        }
    </style>

    const scoreFields = [
        { key: 'hw1', label: 'แบบฝึกหัดที่ 1', max: 5 },
        { key: 'hw2', label: 'แบบฝึกหัดที่ 2', max: 5 },
        { key: 'quiz1', label: 'QUIZ 1', max: 5 },
        { key: 'cw1', label: 'CW1', max: 5 },
        { key: 'cw2', label: 'CW2', max: 5 },
        { key: 'cw3', label: 'CW3', max: 5 },
        { key: 'hw3', label: 'แบบฝึกหัดที่ 3', max: 5 }
    ];

    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') searchStudent();
    });

    function searchStudent() {
        const query = searchInput.value.trim().toUpperCase();
        const resultArea = document.getElementById('resultArea');

        if (!query) {
            resultArea.innerHTML = `
                <div class="result-card">
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m5.231 13.481L15 17.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v16.5c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Zm3.75 11.625a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
                            </svg>
                        </div>
                        <h3>กรุณากรอกรหัสนักศึกษา</h3>
                        <p>ระบบจะแสดงคะแนนเก็บทั้งหมดของคุณ</p>
                    </div>
                </div>`;
            return;
        }

        const student = studentData.find(s => s.id === query);

        if (!student) {
            resultArea.innerHTML = `
                <div class="result-card">
                    <div class="not-found">
                        <div class="not-found-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
                            </svg>
                        </div>
                        <h3>ไม่พบข้อมูลนักศึกษา</h3>
                        <p>ไม่พบรหัส "${query}" ในระบบ กรุณาตรวจสอบรหัสนักศึกษาอีกครั้ง</p>
                    </div>
                </div>`;
            return;
        }

        // Calculate totals
        const totalMax = scoreFields.reduce((s, f) => s + f.max, 0);
        let totalScore = 0;
        let countSubmitted = 0;
        scoreFields.forEach(f => {
            const v = student[f.key];
            if (v !== null && v !== undefined) {
                totalScore += v;
                countSubmitted++;
            }
        });
        const percentage = Math.round((totalScore / totalMax) * 100);

        function scoreCell(val, max) {
            if (val === null || val === undefined) {
                return '<span class="score-cell score-missing">ไม่มีคะแนน</span>';
            }
            const cls = val >= max ? 'score-full' : 'score-partial';
            return `<span class="score-cell ${cls}">${val}</span>`;
        }

        let tableRows = '';
        scoreFields.forEach(f => {
            const val = student[f.key];
            tableRows += `
                <tr>
                    <td>${f.label}</td>
                    <td>${scoreCell(val, f.max)}</td>
                    <td style="color:var(--gray-400);font-size:0.85rem">${f.max}</td>
                </tr>`;
        });

        resultArea.innerHTML = `
            <div class="result-card">
                <div class="student-header">
                    <div class="student-id-badge">${student.id}</div>
                    <div class="student-name">${student.name}</div>
                    <div class="student-meta">ลำดับที่ ${student.no}</div>
                </div>
                <div class="score-summary">
                    <div class="summary-item">
                        <div class="summary-value highlight">${totalScore}<span style="font-size:0.9rem;color:var(--gray-400)">/${totalMax}</span></div>
                        <div class="summary-label">คะแนนรวม</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value">${percentage}%</div>
                        <div class="summary-label">เปอร์เซ็นต์</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value">${countSubmitted}/${scoreFields.length}</div>
                        <div class="summary-label">งานที่ส่ง</div>
                    </div>
                </div>
                <div class="score-table-wrap">
                    <div class="score-table-title">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 0 1 0 3.75H5.625a1.875 1.875 0 0 1 0-3.75Z" />
                        </svg>
                        รายละเอียดคะแนนแต่ละรายการ
                    </div>
                    <table class="score-table">
                        <thead>
                            <tr>
                                <th>รายการ</th>
                                <th>คะแนนที่ได้</th>
                                <th>คะแนนเต็ม</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                        <tfoot>
                            <tr>
                                <td>รวมทั้งหมด</td>
                                <td class="total-score">${totalScore}</td>
                                <td class="total-score">${totalMax}</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>`;
    }
    </script>
